spring:
  application:
    name: ai-assistant-service
  autoconfigure:
    exclude: 
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiTextEmbeddingAutoConfiguration
  
  # Spring AI Configuration - Google GenAI (AI Studio)
  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY:${AIzaSyBowlX8A-ah7W8K2IkX9Pwc4mR1wtup2fY}}
        chat:
          options:
            model: gemini-1.5-flash
            temperature: 0.7
  
  # OpenAI / HuggingFace options can be added here if needed
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Server Configuration
server:
  port: 8088

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# File Upload Configuration
file:
  upload-dir: ${UPLOAD_DIR:../uploads}

logging:
  level:
    com.learnsphere.ai: DEBUG
    org.springframework.ai: INFO

