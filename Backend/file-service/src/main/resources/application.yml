spring:
  application:
    name: file-service
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Server Configuration
server:
  port: 8087

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.learnsphere.file: DEBUG

# AWS Configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:learnsphere-files1}
    region: ${AWS_REGION:eu-north-1}
    # Note: Access keys will be picked up via environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) by default
